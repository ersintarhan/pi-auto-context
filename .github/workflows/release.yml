name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for npm provenance + OIDC trusted publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Intentionally no `registry-url` — setting it makes setup-node
          # write `_authToken=${NODE_AUTH_TOKEN}` into .npmrc which forces
          # token-based auth and breaks the OIDC trusted-publisher flow.

      - name: Upgrade npm to a version with OIDC trusted-publisher support
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing v$PKG_VERSION"

      # OIDC trusted publisher: no NPM_TOKEN. `id-token: write` permission lets
      # npm exchange the GitHub OIDC JWT for a publish credential automatically.
      # See: https://docs.npmjs.com/trusted-publishers
      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
